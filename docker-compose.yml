version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    env_file: .env
    environment:
      POSTGRES_DB: orderflow
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  ingestor:
    build:
      context: .
      dockerfile: ingestors/Dockerfile
    command: python -m ingestors.binance_ingestor
    env_file: .env
    environment:
      DATABASE_URL: postgresql://orderflow:${DB_PASSWORD}@timescaledb:5432/orderflow
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  detector:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    command: python -m analytics.zone_detector
    env_file: .env
    environment:
      DATABASE_URL: postgresql://orderflow:${DB_PASSWORD}@timescaledb:5432/orderflow
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://orderflow:${DB_PASSWORD}@timescaledb:5432/orderflow
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tsdb_data:
  redis_data:
